    - tag: forceplate_raw_template
      title_template: "FP{fp} GRF / COP"
      expand_from_inverse_dynamics_forceplates: true
      mode_filter: [single_plate_strict, multi_plate_v3d]
      nrows: 3
      ncols: 2
      figsize: [14, 10]
      subplots:
